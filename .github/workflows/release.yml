# Builds LocalBeam for macOS (arm64 + x86_64), Windows, and Linux, then
# publishes all installers as a GitHub Release.
# - Push tag v* → creates a GitHub Release from that tag.
# - workflow_dispatch → manually specify the version tag to build and publish.
name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            version:
                description: Version tag to build (e.g. v1.2.3)
                required: true
                type: string

permissions:
    contents: write

jobs:
    resolve-release-meta:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.release-meta.outputs.version }}
            tag_name: ${{ steps.release-meta.outputs.tag_name }}
        steps:
            - uses: actions/checkout@v4

            - name: Resolve release metadata
              id: release-meta
              shell: bash
              run: |
                  set -euo pipefail

                  if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
                    tag_name="${{ github.event.inputs.version }}"
                  else
                    tag_name="${GITHUB_REF#refs/tags/}"
                  fi

                  version="${tag_name#v}"
                  echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
                  echo "version=${version}" >> "${GITHUB_OUTPUT}"

    build-tauri:
        needs: resolve-release-meta
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: "macos-latest"
                      args: "--target aarch64-apple-darwin"
                    - platform: "macos-latest"
                      args: "--target x86_64-apple-darwin"
                    - platform: "ubuntu-22.04"
                      args: ""
                    - platform: "windows-latest"
                      args: ""

        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Cache Rust / Cargo
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri
                  shared-key: release-${{ matrix.platform }}-${{ matrix.args || 'default' }}

            - name: Install dependencies (Ubuntu only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev pkg-config

            - name: Install frontend dependencies
              run: npm install

            - name: Build and publish to GitHub Release
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
              with:
                  tagName: ${{ needs.resolve-release-meta.outputs.tag_name }}
                  releaseName: "LocalBeam ${{ needs.resolve-release-meta.outputs.version }}"
                  releaseBody: |
                      ## LocalBeam ${{ needs.resolve-release-meta.outputs.version }}

                      ### Downloads
                      | Platform | File |
                      |---|---|
                      | macOS (Apple Silicon) | `.dmg` (aarch64) |
                      | macOS (Intel) | `.dmg` (x86_64) |
                      | Windows | `.msi` or `.exe` |
                      | Linux | `.AppImage` / `.deb` |

                      ### macOS unsigned build
                      These macOS builds are unsigned for now. After moving `LocalBeam.app` into `/Applications`, run:

                      ```bash
                      xattr -cr /Applications/LocalBeam.app
                      ```

                      See the Assets section below for all installers.
                  releaseDraft: false
                  prerelease: false
                  args: ${{ matrix.args }}
